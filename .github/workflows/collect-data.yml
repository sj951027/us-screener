# 미국판 데이터 수집 — GitHub Actions 자동 실행 (노트북 불필요)
# 매일 22:00 UTC = 한국 아침 07:00 (미국 마감 후 1~2시간) · 미국 거래일(월~금 ET)만
# 데이터 보관: git 커밋이 아니라 Release 자산(us-data.tar.gz) — repo 비대화 방지.
# 수동 실행: Actions 탭 → collect-us-data → Run workflow
name: collect-us-data

on:
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Download data store (previous state)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download data-store --pattern 'us-data.tar.gz' --dir . && tar xzf us-data.tar.gz || echo "이전 데이터 없음 — 새로 시작"
          mkdir -p us-screener-data
          ls -la us-screener-data/ || true

      - name: Run collectors
        env:
          US_DATA_DIR: ${{ github.workspace }}/us-screener-data
          US_SEED_DB: ${{ github.workspace }}/us-screener-data/us_seed.db
        run: |
          python us_seed_collector.py
          python us_ohlcv_collector.py
          python us_market_series.py
          python us_rotate_collector.py
          python us_short_collector.py

      - name: Build page data (docs/data/us_latest.csv)
        env:
          US_DATA_DIR: ${{ github.workspace }}/us-screener-data
        run: python us_page_data.py

      - name: Commit page data (GitHub Pages 갱신)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/us_latest.csv
          git diff --cached --quiet || (git commit -m "data: us_latest 자동 갱신" && git pull --rebase && git push)

      - name: Telegram test notice (관측 표시 — 매수신호 아님)
        env:
          US_DATA_DIR: ${{ github.workspace }}/us-screener-data
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # 수동 실행은 휴장일 가드 무시하고 항상 전송 (스케줄 실행은 휴장 시 생략)
          TELEGRAM_FORCE: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
        run: python us_notify_test.py

      - name: Integrity gate (손상 DB 업로드 차단)
        run: |
          python - <<'EOF'
          # 손상된 DB 를 업로드하면 멀쩡한 이전본을 덮어써 버린다 — quick_check 통과 시에만 진행.
          import glob, sqlite3, sys
          bad = 0
          for db in sorted(glob.glob("us-screener-data/*.db")):
              try:
                  r = sqlite3.connect(db).execute("PRAGMA quick_check(1)").fetchone()[0]
              except Exception as e:
                  r = f"error: {e}"
              print(f"{db}: {r}")
              if r != "ok":
                  bad += 1
          sys.exit(1 if bad else 0)
          EOF

      - name: Upload data store
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tar czf us-data.tar.gz us-screener-data
          gh release view data-store >/dev/null 2>&1 || gh release create data-store --title "US data store" --notes "수집 데이터 자동 보관용 (매일 갱신)"
          gh release upload data-store us-data.tar.gz --clobber
          echo "업로드 완료: $(du -h us-data.tar.gz | cut -f1)"
          # 금요일(UTC)엔 주간 백업본도 별도 보관 — 매일본이 오염돼도 최대 1주 전으로 복구 가능
          if [ "$(date -u +%u)" = "5" ]; then
            cp us-data.tar.gz us-data-weekly.tar.gz
            gh release upload data-store us-data-weekly.tar.gz --clobber
            echo "주간 백업본 갱신(금요일)"
          fi

      - name: Failure alert (실패 시 텔레그램 한 줄)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="❌ [US] collect-us-data 실패 — 로그: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
