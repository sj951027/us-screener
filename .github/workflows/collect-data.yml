# 미국판 데이터 수집 — GitHub Actions 자동 실행 (노트북 불필요)
# 매일 22:00 UTC = 한국 아침 07:00 (미국 마감 후 1~2시간) · 미국 거래일(월~금 ET)만
# 데이터 보관: git 커밋이 아니라 Release 자산(us-data.tar.gz) — repo 비대화 방지.
# 수동 실행: Actions 탭 → collect-us-data → Run workflow
name: collect-us-data

on:
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Download data store (previous state)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download data-store --pattern 'us-data.tar.gz' --dir . && tar xzf us-data.tar.gz || echo "이전 데이터 없음 — 새로 시작"
          mkdir -p us-screener-data
          ls -la us-screener-data/ || true

      - name: Run collectors
        env:
          US_DATA_DIR: ${{ github.workspace }}/us-screener-data
          US_SEED_DB: ${{ github.workspace }}/us-screener-data/us_seed.db
        run: |
          python us_seed_collector.py
          python us_ohlcv_collector.py
          python us_market_series.py
          python us_rotate_collector.py
          python us_short_collector.py

      - name: Upload data store
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tar czf us-data.tar.gz us-screener-data
          gh release view data-store >/dev/null 2>&1 || gh release create data-store --title "US data store" --notes "수집 데이터 자동 보관용 (매일 갱신)"
          gh release upload data-store us-data.tar.gz --clobber
          echo "업로드 완료: $(du -h us-data.tar.gz | cut -f1)"
